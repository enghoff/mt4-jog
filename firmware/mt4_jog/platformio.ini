; MT4 jog firmware — keyboard jog + J1/J2 homing
; Flash:  python flash_jog.py --port COM6
; Restore: python restore_stock.py --port COM6 --yes

[env:mega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = wiring
upload_port = COM6
; Default hardware UART RX ring buffer (64 bytes) can silently drop bytes
; if loop() is blocked longer than it takes the host to fill it -- `mp`'s
; route/ramp planning can take tens of ms for a long move (an IK solve per
; ~2mm segment), and a tracker retargeting every ~100ms was observed
; dropping bytes mid-line under that load (corrupted `mp` args / `err
; unknown`). 8KB RAM on the 2560 with <1KB used leaves ample room for a
; much bigger margin; still well under the 256-byte threshold where the
; index type would need to widen.
build_flags = -D SERIAL_RX_BUFFER_SIZE=256
