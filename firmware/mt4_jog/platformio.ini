; MT4 jog firmware — keyboard jog + J1/J2 homing
; Flash:  python flash_jog.py --port COM6
; Restore: python restore_stock.py --port COM6 --yes

[env:mega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = wiring
upload_port = COM6
