; MT4 gripper exercise — cycles M3 S40 / S60 on Timer4 PWM (D6 / EX0)
; Flash:  python flash_gripper.py --port COM6
; Restore: python restore_stock.py --port COM6 --yes

[env:mega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_protocol = wiring
upload_port = COM6
